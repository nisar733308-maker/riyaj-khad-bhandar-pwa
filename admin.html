<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCssU0rVx9INImuarodfqZQYpPJLK7W62Q",
    authDomain: "riyaj-khad-store.firebaseapp.com",
    databaseURL: "https://riyaj-khad-store-default-rtdb.firebaseio.com",
    projectId: "riyaj-khad-store",
    storageBucket: "riyaj-khad-store.appspot.com",
    messagingSenderId: "912749567277",
    appId: "1:912749567277:web:6aa9a25e2556f9b87c1474"
  };

  let db, auth;

  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    auth = firebase.auth();
  } catch (e) {
    console.error("Firebase Init Error:", e);
  }

  const allowedAdminEmail = "nisar733308@gmail.com";

  let currentProducts = [];
  let allOrders = [];
  let lastOrderCount = 0;
  let isFirstLoad = true;
  let editingProductId = null;

  const orderSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

  const $ = (id) => document.getElementById(id);

  const toggleUI = (auth) => {
    $("admin-auth").style.display = auth ? "none" : "block";
    $("admin-main").style.display = auth ? "block" : "none";
    $("admin-settings-ui").style.display = auth ? "block" : "none";
  };

  const showAdminPanel = () => {
    toggleUI(true);
    listenToData();
  };

  window.checkAuth = async () => {
    const email = $("admin-email").value.trim();
    const pass = $("admin-pass").value.trim();

    if (!email || !pass) return alert("⚠️ ईमेल और पासवर्ड भरें");
    if (email !== allowedAdminEmail) return alert("⛔ Unauthorized");

    try {
      await auth.signInWithEmailAndPassword(email, pass);
    } catch (err) {
      alert("❌ लॉगिन विफल");
    }
  };

  window.logout = () => auth.signOut().then(() => location.reload());

  auth.onAuthStateChanged(user => {
    if (user?.email === allowedAdminEmail) {
      showAdminPanel();
    } else {
      toggleUI(false);
    }
  });

  const safeParseDate = (dateStr) => {
    try {
      const [d, m, y] = dateStr.split(',')[0].split('/');
      return new Date(y, m - 1, d);
    } catch {
      return new Date();
    }
  };

  const showOrderPopup = (order) => {
    const popup = document.createElement("div");
    popup.className = "order-popup";
    popup.innerHTML = `
      <div class="popup-header">
        <span>🔔 नया ऑर्डर</span>
        <span class="close-popup" onclick="this.parentElement.parentElement.remove()">×</span>
      </div>
      <div>
        <strong>${order.name || 'ग्राहक'}</strong><br>
        ₹${order.total || 0}
      </div>
    `;
    $("notification-container").appendChild(popup);
  };

  const listenToData = () => {
    db.ref("products").on("value", snap => {
      const data = snap.val() || {};
      currentProducts = Object.entries(data).map(([id, v]) => ({ ...v, id }));
      renderAdmin();
    });

    db.ref("orders").on("value", snap => {
      const data = snap.val() || {};
      allOrders = Object.values(data);

      if (!isFirstLoad && allOrders.length > lastOrderCount) {
        orderSound.play().catch(()=>{});
        showOrderPopup(allOrders.at(-1));
      }

      lastOrderCount = allOrders.length;
      isFirstLoad = false;

      updateSalesSummary();
      filterOrders();
    });
  };

  const updateSalesSummary = () => {
    const now = new Date();
    const delivered = allOrders.filter(o => o.status === "Delivered");

    const monthly = delivered.filter(o => {
      const d = safeParseDate(o.date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });

    $("sales-summary-container").innerHTML = `
      <div class="summary-card">
        <h4>कुल बिक्री</h4>
        <p>₹${delivered.reduce((s,o)=>s+o.total,0).toLocaleString()}</p>
      </div>
      <div class="summary-card">
        <h4>महीने की कमाई</h4>
        <p>₹${monthly.reduce((s,o)=>s+o.total,0).toLocaleString()}</p>
      </div>
      <div class="summary-card">
        <h4>ऑर्डर</h4>
        <p>${monthly.length}</p>
      </div>
    `;
  };

  window.filterOrders = () => {
    const term = $("order-search").value.toLowerCase();
    renderOrders(allOrders.filter(o =>
      o.name?.toLowerCase().includes(term) ||
      o.phone?.includes(term)
    ));
  };

  const renderAdmin = () => {
    $("admin-container").innerHTML = currentProducts.map(p => `
      <div class="admin-card">
        <strong>${p.name} (₹${p.price})</strong>
        <input id="stock-${p.id}" value="${p.stockCount}" type="number">
      </div>
    `).join("");
  };

  window.addNewProduct = () => {
    const name = $("new-name").value;
    const price = +$("new-price").value;

    if (!name || !price) return alert("Fill required");

    const id = editingProductId || `p_${Date.now()}`;

    db.ref("products/" + id).set({
      id,
      name,
      price,
      desc: $("new-desc").value,
      image: $("new-img-base64").value,
      stockCount: +$("new-stock").value || 0
    });

    resetForm();
  };

  window.saveStock = () => {
    currentProducts.forEach(p => {
      const val = +$("stock-" + p.id).value;
      db.ref("products/" + p.id).update({
        stockCount: val,
        stockStatus: val < 10 ? "Limited" : "In Stock"
      });
    });
    alert("Updated");
  };

  window.updateOrderStatus = (id, status) =>
    db.ref("orders/" + id).update({ status });

  window.deleteOrder = (id) =>
    confirm("Delete?") && db.ref("orders/" + id).remove();

</script>
